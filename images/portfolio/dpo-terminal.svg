<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">NanoGPT DPO training terminal preview</title>
  <desc id="desc">A terminal-style preview showing training logs for NanoGPT preference alignment on arithmetic tasks.</desc>
  <defs>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="1" stop-color="#101d2f"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="540" rx="24" fill="#060a12"/>
  <rect x="28" y="28" width="904" height="484" rx="18" fill="url(#screen)" stroke="#26364f"/>
  <rect x="28" y="28" width="904" height="46" rx="18" fill="#111827"/>
  <circle cx="58" cy="51" r="7" fill="#ff5f56"/><circle cx="82" cy="51" r="7" fill="#ffbd2e"/><circle cx="106" cy="51" r="7" fill="#27c93f"/>
  <text x="132" y="57" fill="#b8c7d9" font-family="Consolas,Menlo,monospace" font-size="15">nanogpt-dpo-arithmetic — training.log</text>
  <g font-family="Consolas,Menlo,monospace" font-size="18" filter="url(#softGlow)">
    <text x="54" y="114" fill="#7ee787">$ python train_dpo.py --model nanogpt --task algebra --beta 0.1</text>
    <text x="54" y="150" fill="#c9d1d9">[data] loaded 100,000+ preference pairs (positive reasoning / negative base samples)</text>
    <text x="54" y="186" fill="#c9d1d9">[sft ] warm-start checkpoint: ckpt_sft_iter_20000.pt</text>
    <text x="54" y="222" fill="#58a6ff">[dpo ] iter 004000 | loss 0.412 | chosen_logp ↑ | rejected_logp ↓</text>
    <text x="54" y="258" fill="#58a6ff">[eval] arithmetic accuracy: 91.7% | one-variable algebra: 90.4%</text>
    <text x="54" y="294" fill="#ffdd66">[case] solve: 3x + 7 = 22</text>
    <text x="54" y="330" fill="#c9d1d9">       reasoning: subtract 7 from both sides → 3x = 15 → x = 5</text>
    <text x="54" y="366" fill="#7ee787">       answer: x = 5  ✓</text>
    <text x="54" y="414" fill="#f0883e">[base] accuracy ≈ 0%  →  [aligned] accuracy &gt; 90%</text>
    <text x="54" y="462" fill="#8b949e"># SFT + DPO preference alignment for small language-model arithmetic reasoning</text>
  </g>
</svg>
