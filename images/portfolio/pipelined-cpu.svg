<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">5-stage pipelined MIPS processor overview</title>
  <desc id="desc">A schematic preview of a five-stage MIPS pipeline with hazard detection, forwarding, FPGA output, and sparse-matrix visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#15324a"/>
    </linearGradient>
    <linearGradient id="block" x1="0" x2="1">
      <stop offset="0" stop-color="#36c2ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ad8ff"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="26" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#e6f7ff">
    <path d="M40 82 H920 M40 162 H920 M40 242 H920 M40 322 H920 M40 402 H920 M160 40 V500 M320 40 V500 M480 40 V500 M640 40 V500 M800 40 V500"/>
  </g>
  <text x="48" y="64" fill="#f4fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">5-Stage Pipelined MIPS Processor</text>
  <text x="50" y="94" fill="#b6c8d8" font-family="Consolas,Menlo,monospace" font-size="15">Verilog · Vivado · hazard detection · forwarding · FPGA display</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" text-anchor="middle" filter="url(#glow)">
    <g transform="translate(54 170)">
      <rect width="142" height="92" rx="16" fill="url(#block)"/>
      <text x="71" y="39" fill="#06111f" font-size="23">IF</text>
      <text x="71" y="66" fill="#092135" font-size="13">Instruction Fetch</text>
    </g>
    <g transform="translate(228 170)">
      <rect width="142" height="92" rx="16" fill="url(#block)"/>
      <text x="71" y="39" fill="#06111f" font-size="23">ID</text>
      <text x="71" y="66" fill="#092135" font-size="13">Decode / RegFile</text>
    </g>
    <g transform="translate(402 170)">
      <rect width="142" height="92" rx="16" fill="url(#block)"/>
      <text x="71" y="39" fill="#06111f" font-size="23">EX</text>
      <text x="71" y="66" fill="#092135" font-size="13">ALU / Branch</text>
    </g>
    <g transform="translate(576 170)">
      <rect width="142" height="92" rx="16" fill="url(#block)"/>
      <text x="71" y="39" fill="#06111f" font-size="23">MEM</text>
      <text x="71" y="66" fill="#092135" font-size="13">Data Memory</text>
    </g>
    <g transform="translate(750 170)">
      <rect width="142" height="92" rx="16" fill="url(#block)"/>
      <text x="71" y="39" fill="#06111f" font-size="23">WB</text>
      <text x="71" y="66" fill="#092135" font-size="13">Write Back</text>
    </g>
  </g>
  <g stroke="#9ad8ff" stroke-width="4" marker-end="url(#arrow)" fill="none">
    <path d="M198 216 H224"/><path d="M372 216 H398"/><path d="M546 216 H572"/><path d="M720 216 H746"/>
    <path d="M473 268 C473 323 299 323 299 268" stroke="#ffdd66"/>
    <path d="M647 268 C647 352 474 352 474 268" stroke="#ffdd66"/>
  </g>
  <g font-family="Consolas,Menlo,monospace" font-size="14">
    <rect x="208" y="318" width="176" height="60" rx="12" fill="#10243a" stroke="#ffdd66"/>
    <text x="228" y="345" fill="#ffdd66">hazard detection</text>
    <text x="228" y="365" fill="#e8f2ff">stall / flush control</text>
    <rect x="416" y="350" width="170" height="58" rx="12" fill="#10243a" stroke="#ffdd66"/>
    <text x="436" y="377" fill="#ffdd66">forwarding unit</text>
    <text x="436" y="397" fill="#e8f2ff">EX/MEM → ALU mux</text>
  </g>
  <g transform="translate(638 336)">
    <rect width="252" height="102" rx="16" fill="#0f1d32" stroke="#7ee787"/>
    <text x="22" y="36" fill="#7ee787" font-family="Consolas,Menlo,monospace" font-size="16">FPGA Output</text>
    <g fill="none" stroke="#7ee787" stroke-width="5" stroke-linecap="round">
      <path d="M30 54 h22 v22 h-22 z M65 54 h22 v22 h-22 z M100 54 h22 v22 h-22 z"/>
      <path d="M154 54 h60 M154 76 h60 M154 54 v22 M214 54 v22"/>
    </g>
    <text x="24" y="92" fill="#b6c8d8" font-family="Consolas,Menlo,monospace" font-size="12">sparse matrix result display</text>
  </g>
  <text x="50" y="482" fill="#d7e8f7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Custom instructions and software-level decoding drive 7-segment display logic.</text>
  <text x="50" y="512" fill="#7ee787" font-family="Consolas,Menlo,monospace" font-size="18">max clock: 66.9 MHz · CPI: 1.13</text>
</svg>
